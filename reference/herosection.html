<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>قادر برودكشن | إبداع يليق بكل لحظة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Tajawal', 'Cairo', sans-serif;
  background: #0D0D0D;
  color: #F5F5F5;
  overflow-x: hidden;
  min-height: 100vh;
}

.poster-container {
  width: 720px;
  min-height: 1080px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 100%);
}

.hero-background {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://sfile.chatglm.cn/images-ppt/f4b56c170504.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  opacity: 0.3;
  z-index: 1;
  animation: zoomIn 20s ease-in-out infinite alternate;
}

@keyframes zoomIn {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, 
    rgba(13, 13, 13, 0.4) 0%, 
    rgba(13, 13, 13, 0.85) 60%, 
    rgba(13, 13, 13, 0.95) 100%);
  z-index: 2;
}

.hero-content {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 1080px;
  padding: 0 40px;
  text-align: center;
}

.nav-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 30px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  backdrop-filter: blur(10px);
  background: rgba(13, 13, 13, 0.4);
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
}

.logo {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 50%, #A07830 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.nav-links {
  display: flex;
  gap: 30px;
  align-items: center;
}

.nav-link {
  color: #F5F5F5;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  opacity: 0.8;
  transition: all 0.3s ease;
  position: relative;
}

.nav-link:hover {
  opacity: 1;
  color: #E2C06E;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, #C9A84C, #E2C06E);
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}

.cta-nav {
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 100%);
  color: #0D0D0D;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
}

.cta-nav:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201, 168, 76, 0.5);
}

.eyebrow {
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 30px;
  font-weight: 600;
  opacity: 0;
  animation: fadeInDown 1s ease 0.5s forwards;
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.headline-container {
  margin-bottom: 40px;
}

.headline-line {
  font-size: 72px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeInUp 1s ease forwards;
}

.headline-line:nth-child(1) {
  animation-delay: 0.7s;
  color: #F5F5F5;
}

.headline-line:nth-child(2) {
  animation-delay: 0.9s;
  color: #F5F5F5;
}

.headline-line:nth-child(3) {
  animation-delay: 1.1s;
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 50%, #A07830 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.subtitle {
  font-size: 18px;
  line-height: 1.8;
  max-width: 550px;
  color: #B8B8B8;
  margin-bottom: 60px;
  opacity: 0;
  animation: fadeIn 1.5s ease 1.3s forwards;
  font-weight: 400;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

.button-group {
  display: flex;
  gap: 20px;
  margin-bottom: 80px;
  opacity: 0;
  animation: fadeInUp 1s ease 1.5s forwards;
}

.btn-primary {
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 100%);
  color: #0D0D0D;
  padding: 18px 48px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 8px 25px rgba(201, 168, 76, 0.4);
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s ease;
}

.btn-primary:hover::before {
  left: 100%;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(201, 168, 76, 0.6);
}

.btn-secondary {
  background: rgba(201, 168, 76, 0.1);
  color: #E2C06E;
  padding: 18px 48px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.3s ease;
  border: 2px solid rgba(201, 168, 76, 0.3);
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(201, 168, 76, 0.2);
  border-color: #C9A84C;
  transform: translateY(-3px);
}

.stats-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  max-width: 640px;
  opacity: 0;
  animation: fadeIn 1.5s ease 1.8s forwards;
}

.stat-item {
  text-align: center;
  padding: 25px;
  background: rgba(30, 30, 30, 0.5);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(201, 168, 76, 0.1);
  transition: all 0.3s ease;
}

.stat-item:hover {
  transform: translateY(-5px);
  border-color: rgba(201, 168, 76, 0.3);
  background: rgba(30, 30, 30, 0.7);
}

.stat-number {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.stat-label {
  font-size: 13px;
  color: #B8B8B8;
  font-weight: 500;
}

.gold-accent {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201, 168, 76, 0.15) 0%, transparent 70%);
  filter: blur(60px);
  z-index: 2;
}

.gold-accent-1 {
  top: 10%;
  right: -100px;
  animation: pulse 8s ease-in-out infinite;
}

.gold-accent-2 {
  bottom: 20%;
  left: -100px;
  animation: pulse 8s ease-in-out infinite 3s;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.2);
    opacity: 0.5;
  }
}

.scroll-indicator {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  opacity: 0;
  animation: fadeIn 1.5s ease 2s forwards, bounce 2s ease-in-out infinite 2.5s;
}

@keyframes bounce {
  0%, 100% {
    transform: translateX(-50%) translateY(0);
  }
  50% {
    transform: translateX(-50%) translateY(-10px);
  }
}

.material-icons {
  font-size: 32px;
  color: #C9A84C;
}
</style>
</head>
<body>
<div class="poster-container">
<div class="hero-background"></div>
<div class="hero-overlay"></div>
<div class="gold-accent gold-accent-1"></div>
<div class="gold-accent gold-accent-2"></div>

<nav class="nav-bar">
<div class="logo">قادر برودكشن</div>
<div class="nav-links">
<a href="#about" class="nav-link">من نحن</a>
<a href="#services" class="nav-link">الخدمات</a>
<a href="#portfolio" class="nav-link">أعمالنا</a>
<a href="#contact" class="cta-nav">تواصل معنا</a>
</div>
</nav>

<div class="hero-content">
<div class="eyebrow">QADER PRODUCTION</div>
<div class="headline-container">
<div class="headline-line">قادر برودكشن</div>
<div class="headline-line">إبداع يليق</div>
<div class="headline-line">بكل لحظة</div>
</div>
<p class="subtitle">
نصنع المحتوى البصري الذي يتحدث بدلاً عنك — بدقة احترافية، وإبداع لا حدود له.
</p>
<div class="button-group">
<a href="#services" class="btn-primary">اكتشف خدماتنا</a>
<a href="#portfolio" class="btn-secondary">أعمالنا</a>
</div>

<div class="stats-container">
<div class="stat-item">
<div class="stat-number">150+</div>
<div class="stat-label">مشروع منجز</div>
</div>
<div class="stat-item">
<div class="stat-number">80+</div>
<div class="stat-label">عميل راضٍ</div>
</div>
<div class="stat-item">
<div class="stat-number">7+</div>
<div class="stat-label">سنوات خبرة</div>
</div>
<div class="stat-item">
<div class="stat-number">3+</div>
<div class="stat-label">مدن خدمة</div>
</div>
</div>
</div>

<div class="scroll-indicator">
<i class="material-icons">keyboard_arrow_down</i>
</div>
</div>
</body>
</html>
