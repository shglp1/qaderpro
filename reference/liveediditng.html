<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>التحديث المباشر - قادر برودكشن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Tajawal', 'Cairo', sans-serif;
  background: #0D0D0D;
  color: #F5F5F5;
  overflow-x: hidden;
}

.poster-container {
  width: 720px;
  min-height: 1080px;
  margin: 0 auto;
  position: relative;
  background: linear-gradient(180deg, #0D0D0D 0%, #0A0A0A 100%);
  padding: 80px 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.live-indicator {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30, 30, 30, 0.8);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(76, 175, 80, 0.3);
  border-radius: 30px;
  padding: 15px 35px;
  display: flex;
  align-items: center;
  gap: 15px;
  z-index: 10;
}

.live-dot {
  width: 12px;
  height: 12px;
  background: #4CAF50;
  border-radius: 50%;
  animation: pulse-live 2s ease-in-out infinite;
}

@keyframes pulse-live {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.3);
    opacity: 0.7;
  }
}

.live-text {
  font-size: 16px;
  font-weight: 700;
  color: #F5F5F5;
}

.live-users {
  font-size: 13px;
  color: #4CAF50;
  padding: 6px 15px;
  background: rgba(76, 175, 80, 0.15);
  border-radius: 20px;
}

.split-view {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-bottom: 40px;
}

.panel {
  background: rgba(30, 30, 30, 0.4);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  border: 1px solid rgba(201, 168, 76, 0.15);
  overflow: hidden;
}

.panel-header {
  background: rgba(201, 168, 76, 0.1);
  border-bottom: 1px solid rgba(201, 168, 76, 0.2);
  padding: 18px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-title {
  font-size: 18px;
  font-weight: 700;
  color: #F5F5F5;
}

.panel-badge {
  background: rgba(201, 168, 76, 0.2);
  border: 1px solid rgba(201, 168, 76, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: #E2C06E;
}

.panel-content {
  padding: 30px;
}

.edit-field {
  margin-bottom: 20px;
}

.field-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: #E2C06E;
  margin-bottom: 10px;
}

.field-input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(13, 13, 13, 0.6);
  border: 1px solid rgba(201, 168, 76, 0.15);
  border-radius: 12px;
  color: #F5F5F5;
  font-size: 14px;
  font-family: 'Tajawal', sans-serif;
  transition: all 0.3s ease;
}

.field-input:focus {
  outline: none;
  border-color: rgba(201, 168, 76, 0.4);
}

.btn-save {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #C9A84C 0%, #E2C06E 100%);
  border: none;
  border-radius: 12px;
  color: #0D0D0D;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Tajawal', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(201, 168, 76, 0.3);
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(201, 168, 76, 0.5);
}

.preview-content {
  padding: 30px;
  text-align: center;
}

.preview-title {
  font-size: 32px;
  font-weight: 900;
  color: #F5F5F5;
  margin-bottom: 15px;
}

.preview-subtitle {
  font-size: 20px;
  color: #A8A8A8;
  margin-bottom: 20px;
  line-height: 1.6;
}

.sync-animation {
  text-align: center;
  padding: 30px;
}

.sync-icon {
  font-size: 60px;
  color: #4CAF50;
  animation: rotate 2s linear infinite;
}

@keyframes rotate {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

.sync-text {
  font-size: 18px;
  font-weight: 700;
  color: #F5F5F5;
  margin-top: 15px;
}

.update-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(76, 175, 80, 0.15);
  border: 1px solid rgba(76, 175, 80, 0.3);
  border-radius: 25px;
  padding: 12px 25px;
  font-size: 14px;
  font-weight: 600;
  color: #4CAF50;
  margin-top: 20px;
}

.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30, 30, 30, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(76, 175, 80, 0.4);
  border-radius: 14px;
  padding: 18px 35px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
  z-index: 100;
}

.toast .material-icons {
  font-size: 24px;
  color: #4CAF50;
}

.toast-text {
  font-size: 15px;
  font-weight: 600;
  color: #F5F5F5;
}

.material-icons {
  vertical-align: middle;
}
</style>
</head>
<body>
<div class="poster-container">
<div class="live-indicator">
<div class="live-dot"></div>
<span class="live-text">تحديث فوري</span>
<span class="live-users">يتحدث لجميع المستخدمين</span>
</div>

<div class="split-view">
<div class="panel">
<div class="panel-header">
<span class="panel-title">لوحة التحكم</span>
<span class="panel-badge">Admin</span>
</div>
<div class="panel-content">
<div class="edit-field">
<label class="field-label">العنوان الرئيسي</label>
<input type="text" class="field-input" value="قادر برودكشن"/>
</div>
<div class="edit-field">
<label class="field-label">السطر الأول</label>
<input type="text" class="field-input" value="إبداع يليق"/>
</div>
<div class="edit-field">
<label class="field-label">السطر الثاني</label>
<input type="text" class="field-input" value="بكل لحظة"/>
</div>
<button class="btn-save">
<i class="material-icons">save</i>
حفظ التغييرات
</button>
</div>
</div>

<div class="panel">
<div class="panel-header">
<span class="panel-title">الموقع المباشر</span>
<span class="panel-badge" style="background: rgba(76, 175, 80, 0.2); border-color: rgba(76, 175, 80, 0.3); color: #4CAF50;">Live</span>
</div>
<div class="preview-content">
<div class="preview-title">قادر برودكشن</div>
<div class="preview-subtitle">إبداع يليق بكل لحظة</div>
<div class="update-badge">
<i class="material-icons" style="font-size: 18px;">sync</i>
<span>متزامن</span>
</div>
</div>
</div>
</div>

<div class="sync-animation">
<i class="material-icons sync-icon">sync</i>
<div class="sync-text">تحديث فوري بدون إعادة تحميل</div>
</div>

<div class="toast">
<i class="material-icons">check_circle</i>
<span class="toast-text">✓ تم التحديث بنجاح - يتحدث لجميع المستخدمين</span>
</div>
</div>
</body>
</html>
